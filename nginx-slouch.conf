# /etc/nginx/sites-available/slouch
# Nginx reverse proxy for slou.ch → Express app on port 3001

server {
    listen 80;
    listen [::]:80;
    server_name slou.ch;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name slou.ch;

    # SSL certificates (update paths after running certbot)
    ssl_certificate /etc/letsencrypt/live/slou.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slou.ch/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Max upload size (match Express multer limit)
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
